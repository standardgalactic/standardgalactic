<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RSVP Audio Scope</title>

<style>

body{
margin:0;
background:#000;
color:#7cff7c;
font-family:monospace;
display:flex;
flex-direction:column;
align-items:center;
text-align:center;
padding:20px;
}

/* ===== porthole ===== */

.scope-wrap{
position:relative;
width:360px;
height:360px;
margin-bottom:20px;
}

.scope-wrap::before{
content:"";
position:absolute;
inset:0;
border-radius:50%;
background:
radial-gradient(circle at 50% 50%, #003300 60%, #001100 70%, #000 100%);
box-shadow:
0 0 0 4px #001a00,
0 0 20px #00ff0030,
inset 0 0 40px #00ff0020;
}

.scope-wrap::after{
content:"";
position:absolute;
inset:20px;
border-radius:50%;
background:
linear-gradient(120deg, rgba(255,255,255,0.06), transparent 40%);
pointer-events:none;
}

canvas{
position:absolute;
inset:20px;
width:320px;
height:320px;
border-radius:50%;
background:#000;
box-shadow:inset 0 0 20px #00ff0020;
touch-action:none;
}

.scanlines{
position:absolute;
inset:20px;
border-radius:50%;
background:
repeating-linear-gradient(
to bottom,
rgba(0,255,0,0.05) 0px,
rgba(0,255,0,0.05) 1px,
transparent 2px,
transparent 4px
);
pointer-events:none;
}

/* ===== controls ===== */

.controls{
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
margin-bottom:12px;
}

button, select, input{
background:#001400;
border:1px solid #00ff00;
color:#7cff7c;
padding:8px 14px;
font-size:.8em;
cursor:pointer;
}

.timer{
min-width:80px;
font-size:1.1em;
}

label{
display:flex;
align-items:center;
gap:6px;
font-size:.8em;
}

</style>
</head>

<body>

<h2>How AI Models Deduce Physical Laws</h2>

<div class="scope-wrap">
<canvas id="scope"></canvas>
<div class="scanlines"></div>
</div>

<div class="controls">

<button id="toggle">Play</button>

<label>
Speed
<select id="speed">
<option value="0.75">0.75×</option>
<option value="0.85">0.85×</option>
<option value="0.95" selected>0.95×</option>
<option value="1">1×</option>
<option value="1.1">1.1×</option>
</select>
</label>

<label>
Pitch
<input id="pitch" type="range" min="-400" max="400" value="-100">
</label>

<button id="loop">Loop Off</button>

<div class="timer" id="timer">--:--</div>

</div>

<audio id="audio" src="How-AI-models-deduce-physical-laws.mp3"></audio>

<script>

/* ===== elements ===== */

const audio = document.getElementById("audio")
const toggle = document.getElementById("toggle")
const loop = document.getElementById("loop")
const timer = document.getElementById("timer")
const speed = document.getElementById("speed")
const pitch = document.getElementById("pitch")

/* ===== audio engine ===== */

let audioCtx, analyser, buffer

function initAudio(){

if(audioCtx) return

audioCtx = new (window.AudioContext||window.webkitAudioContext)()

analyser = audioCtx.createAnalyser()
analyser.fftSize = 2048

const src = audioCtx.createMediaElementSource(audio)

src.connect(analyser)
analyser.connect(audioCtx.destination)

buffer = new Uint8Array(analyser.fftSize)

/* allow pitch shift via playbackRate */
audio.preservesPitch = false
audio.mozPreservesPitch = false
audio.webkitPreservesPitch = false

}

/* ===== controls ===== */

function updatePlayback(){
const baseSpeed = parseFloat(speed.value)
const cents = parseFloat(pitch.value)
const pitchFactor = Math.pow(2, cents / 1200)

audio.playbackRate = baseSpeed * pitchFactor
}

toggle.onclick = ()=>{

initAudio()

if(audio.paused){
audioCtx.resume().then(()=>audio.play())
toggle.textContent = "Pause"
}else{
audio.pause()
toggle.textContent = "Play"
}

}

loop.onclick = ()=>{
audio.loop = !audio.loop
loop.textContent = audio.loop ? "Loop On" : "Loop Off"
}

speed.onchange = updatePlayback
pitch.oninput = updatePlayback

/* ===== timer ===== */

function fmt(t){
const m=Math.floor(t/60)
const s=Math.floor(t%60)
return`${m.toString().padStart(2,"0")}:${s.toString().padStart(2,"0")}`
}

function updateTimer(){
if(audio.duration) timer.textContent = fmt(audio.duration - audio.currentTime)
requestAnimationFrame(updateTimer)
}
updateTimer()

/* ===== canvas ===== */

const canvas = document.getElementById("scope")
const ctx = canvas.getContext("2d")

const dpr = window.devicePixelRatio || 1
canvas.width = 320 * dpr
canvas.height = 320 * dpr
ctx.setTransform(dpr,0,0,dpr,0,0)

/* ===== interaction ===== */

let tiltX=0, tiltY=0
let sparkle=0
let holding=false
let holdStart=0
let colorPhase=0
let colorSpeed=0

canvas.addEventListener("pointerdown",()=>{
sparkle=1
holding=true
holdStart=performance.now()
})

canvas.addEventListener("pointerup",()=>{
holding=false
colorSpeed*=0.5
})

window.addEventListener("deviceorientation",(e)=>{
tiltX=(e.gamma||0)/45
tiltY=(e.beta||0)/45
})

/* ===== entropy ===== */

function entropy(buf){
let m=0
for(let i=0;i<buf.length;i++) m+=buf[i]
m/=buf.length
let v=0
for(let i=0;i<buf.length;i++){
let d=buf[i]-m
v+=d*d
}
return v/buf.length
}

/* ===== draw ===== */

let phase=0
let eSmooth=0

function draw(){

if(analyser){

analyser.getByteTimeDomainData(buffer)

const e = entropy(buffer)
eSmooth += (e - eSmooth)*0.05
const en = Math.min(eSmooth/5000,1)

if(holding){
if((performance.now()-holdStart)>600){
colorSpeed += 0.002
}
}else{
colorSpeed *= 0.95
}

colorPhase += colorSpeed

ctx.fillStyle="rgba(0,0,0,0.15)"
ctx.fillRect(0,0,320,320)

ctx.beginPath()

for(let i=0;i<buffer.length;i++){

const t=i/buffer.length*2*Math.PI
const a=(buffer[i]-128)/128

const f1=3+en*2
const f2=4+en*3

const x=Math.sin(f1*t+phase)*a*130*(1+en*0.5)
const y=Math.sin(f2*t)*a*130*(1+en*0.5)

const px=160+x+tiltX*30
const py=160+y+tiltY*30

if(i===0) ctx.moveTo(px,py)
else ctx.lineTo(px,py)

}

ctx.strokeStyle=`rgb(${Math.sin(colorPhase)*80},255,${120+Math.cos(colorPhase)*80})`
ctx.lineWidth=1.4+en
ctx.shadowColor="#00ff88"
ctx.shadowBlur=10+en*20
ctx.stroke()
ctx.shadowBlur=0

if(sparkle>0){
for(let i=0;i<15;i++){
ctx.fillStyle="#aaffcc"
ctx.fillRect(
160+Math.random()*30-15,
160+Math.random()*30-15,
2,2
)
}
sparkle*=0.9
}

phase+=0.01+en*0.03

}

requestAnimationFrame(draw)

}

draw()

/* ===== error ===== */

audio.addEventListener("error",()=>{
timer.textContent="ERR"
})

</script>

</body>
</html>
